version: "3.9"

# ============================================================
#  docker-compose.yml — Local Development
#  Runs: React Frontend + Node.js Backend + MongoDB
# ============================================================

services:

  # React Frontend
  frontend:
    build: ./frontend
    container_name: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - todo-network

  # Node.js Backend
  backend:
    build: ./backend
    container_name: todo-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/tododb
    depends_on:
      - mongo
    networks:
      - todo-network

  # MongoDB Database
  mongo:
    image: mongo:6-jammy
    container_name: todo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - todo-network

volumes:
  mongo_data:

networks:
  todo-network:
    driver: bridge
